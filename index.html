<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gosa Negeso | Software Innovator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { background: #0f172a; color: white; overflow-x: hidden; }

        /* --- HERO SECTION with Dodola School Background --- */
        #hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Replace the URL below with your school photo filename */
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), 
                        url('dodola-school.jpg'); 
            background-size: cover;
            background-position: center;
            transition: 0.8s ease-in-out;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        .profile-pic { 
            width: 140px; height: 140px; border-radius: 50%; 
            border: 4px solid #23d5ab; margin-bottom: 20px; object-fit: cover; 
        }

        /* --- PORTFOLIO SECTION (The Inside) --- */
        #portfolio {
            display: none;
            padding: 80px 20px;
            max-width: 1100px;
            margin: 0 auto;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 40px; }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .btn {
            background: #23d5ab; color: #0f172a; padding: 15px 35px; border-radius: 50px;
            text-decoration: none; font-weight: bold; cursor: pointer; border: none;
        }

        .back-btn {
            position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1);
            color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; border: none;
        }
    </style>
</head>
<body>

    <section id="hero">
        <div class="glass-card">
            <img src="Screenshot 2026-04-11 210033.png" alt="Gosa" class="profile-pic">
            <h1>Gosa Negeso</h1>
            <p style="margin-bottom: 25px; color: #23d5ab; font-weight: 600;">Dodola Boarding School Senior</p>
            <button class="btn" onclick="enterSite()">Enter Portfolio</button>
        </div>
    </section>

    <section id="portfolio">
        <button class="back-btn" onclick="exitSite()">← Back</button>
        <h2 style="text-align: center; font-size: 2.8rem; color: #23d5ab;">Innovation Dashboard</h2>
        
        <div class="grid">
            <div class="card">
                <h3>Agro-Mesh</h3>
                <p>Empowering farmers with radio-based market and climate data.</p>
            </div>
            <div class="card">
                <h3>Stooping Club</h3>
                <p>Chief Product Officer managing electronics repair and distribution.</p>
            </div>
            <div class="card">
                <h3>Achievements</h3>
                <p>National Youth Laureate & Top 0.00001% National Exam Score.</p>
            </div>
        </div>
    </section>

    <script>
        function enterSite() {
            document.getElementById('hero').style.display = 'none';
            document.getElementById('portfolio').style.display = 'block';
            window.scrollTo(0,0);
        }
        function exitSite() {
            document.getElementById('portfolio').style.display = 'none';
            document.getElementById('hero').style.display = 'flex';
        }
    </script>
</body>
</html>

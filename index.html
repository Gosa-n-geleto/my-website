<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodola Lab | Source of Genus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&family=Major+Mono+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #23d5ab;
            --bg: #01040a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #e2e8f0; font-family: var(--font-main); overflow-x: hidden; }

        /* --- AUTHENTICATION --- */
        #auth-portal {
            position: fixed; inset: 0; z-index: 10000;
            background: linear-gradient(rgba(1,4,10,0.9), rgba(1,4,10,0.9)), 
                        url('https://gosa-n-geleto.github.io/my-website/image_0e63d9.jpg') center/cover;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: rgba(1, 4, 10, 0.95); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); padding: 60px; border-radius: 40px;
            width: 100%; max-width: 450px; text-align: center;
        }
        .pin-input {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 20px; width: 100%; color: white;
            font-family: var(--font-mono); font-size: 1.5rem; letter-spacing: 15px;
            text-align: center; margin: 30px 0;
        }

        /* --- DASHBOARD --- */
        #dashboard { display: none; padding-bottom: 100px; }
        header { 
            padding: 30px 8%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(1,4,10,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100;
        }
        .nav-pill { 
            padding: 10px 25px; border-radius: 50px; border: 1px solid var(--glass-border); 
            background: var(--glass); color: white; cursor: pointer; font-family: var(--font-mono); font-size: 0.8rem;
        }
        .nav-pill.active { background: var(--neon); color: var(--bg); font-weight: bold; }

        .dossier-hero {
            margin: 40px 8%; background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 35px; padding: 60px; display: flex; justify-content: space-between; align-items: center;
        }

        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; padding: 0 8%; }
        .sub-card {
            background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 40px; cursor: pointer; transition: var(--transition);
        }
        .sub-card:hover { transform: translateY(-10px); border-color: var(--neon); background: rgba(35,213,171,0.04); }

        /* --- ROOM SELECTION --- */
        #room-overlay {
            display: none; position: fixed; inset: 0; z-index: 11000;
            background: rgba(1,4,10,0.98); backdrop-filter: blur(20px);
            align-items: center; justify-content: center;
        }
        .room-choice-container { display: flex; gap: 40px; max-width: 1000px; width: 90%; }
        .room-box {
            flex: 1; padding: 60px 40px; border-radius: 30px; border: 1px solid var(--glass-border);
            background: var(--glass); text-align: center; cursor: pointer; transition: var(--transition);
        }
        .room-box:hover { border-color: var(--neon); background: rgba(35,213,171,0.05); transform: scale(1.05); }
        .room-box h2 { font-family: 'Major Mono Display'; color: var(--neon); margin-bottom: 20px; }

        /* --- WORKSPACE --- */
        #workspace {
            display: none; position: fixed; inset: 0; z-index: 12000; background: var(--bg);
            padding: 60px 10%; overflow-y: auto;
        }
        .status-bar { display: flex; justify-content: space-between; border-bottom: 1px solid var(--glass-border); padding-bottom: 30px; margin-bottom: 50px; }
        .clock { font-family: var(--font-mono); color: var(--neon); font-size: 2.5rem; font-weight: 700; }
        .content-area { max-width: 850px; margin: 0 auto; }
        .note-card { background: var(--glass); border-left: 4px solid var(--neon); padding: 30px; border-radius: 12px; line-height: 1.8; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="auth-portal">
        <div class="auth-card">
            <h1 style="font-family:'Major Mono Display'; font-size: 2rem;">DODOLA_LAB</h1>
            <p style="opacity:0.4; font-size:0.7rem; letter-spacing:4px; margin-top:10px;">SECURE GATEWAY</p>
            <input type="password" id="pin" class="pin-input" maxlength="4" placeholder="••••">
            <button class="nav-pill" style="width:100%; padding:20px; background:var(--neon); color:var(--bg);" onclick="validate()">INITIALIZE</button>
        </div>
    </div>

    <div id="dashboard">
        <header>
            <h2 style="font-family:'Major Mono Display'; color:var(--neon); font-size:1rem;">DODOLA_v6.0</h2>
            <div id="hub-clock" style="font-family:var(--font-mono); color:var(--neon);">02:32:57</div>
        </header>

        <div class="dossier-hero">
            <div>
                <h1 style="font-family:'Major Mono Display'; font-size: 4rem; color:var(--neon);">G12_HUB</h1>
                <p style="max-width:500px; opacity:0.7; margin-top:20px;">Advancing mathematical logic to solve systemic inequality.</p>
            </div>
            <div style="text-align: right;">
                <p style="opacity:0.4; font-size:0.7rem; letter-spacing:3px;">NATIONAL_RECORD</p>
                <h1 style="font-size: 7rem; font-weight: 700; line-height: 1;">590<span style="font-size:1.5rem; opacity:0.2;">/600</span></h1>
            </div>
        </div>

        <div class="subject-grid" id="subjects"></div>
    </div>

    <div id="room-overlay">
        <div class="room-choice-container">
            <div class="room-box" onclick="enterRoom('study')">
                <h2>STUDY_ROOM</h2>
                <p style="opacity:0.6;">Deep-logic notes and concept frameworks.</p>
            </div>
            <div class="room-box" onclick="enterRoom('exam')">
                <h2>EXAM_ROOM</h2>
                <p style="opacity:0.6;">High-pressure logic simulations for National Exam prep.</p>
            </div>
        </div>
        <button class="nav-pill" style="position:fixed; bottom:50px;" onclick="closeOverlay()">CANCEL</button>
    </div>

    <div id="workspace">
        <div class="status-bar">
            <div>
                <h1 id="work-title" style="font-family:'Major Mono Display'; font-size:2rem;">SUBJECT</h1>
                <p id="work-mode" style="color:var(--neon); font-size:0.8rem; letter-spacing:2px;">MODE_ACTIVE</p>
            </div>
            <div id="work-clock" class="clock">02:32:57</div>
        </div>
        <div class="content-area" id="work-content"></div>
        <button class="nav-pill" style="margin-top:60px; border-color:var(--neon);" onclick="exitWork()">EXIT_TO_HUB</button>
    </div>

    <script>
        let currentSubject = '';

        function validate() {
            const p = document.getElementById('pin').value;
            if(p.length === 4) {
                document.getElementById('auth-portal').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                renderSubjects();
            }
        }

        function renderSubjects() {
            const subs = ['Maths', 'Physics', 'Chemistry', 'Biology', 'History', 'Geography', 'Economics', 'English'];
            document.getElementById('subjects').innerHTML = subs.map(s => `
                <div class="sub-card" onclick="selectSubject('${s}')">
                    <p style="color:var(--neon); font-size:0.6rem; letter-spacing:3px;">G12_LOGIC</p>
                    <h3 style="font-family:'Major Mono Display'; font-size:1.5rem;">${s.toUpperCase()}</h3>
                </div>
            `).join('');
        }

        function selectSubject(s) {
            currentSubject = s;
            document.getElementById('room-overlay').style.display = 'flex';
        }

        function enterRoom(mode) {
            document.getElementById('room-overlay').style.display = 'none';
            document.getElementById('workspace').style.display = 'block';
            document.getElementById('work-title').innerText = currentSubject;
            document.getElementById('work-mode').innerText = mode.toUpperCase() + '_ROOM';
            
            const content = document.getElementById('work-content');
            if(mode === 'study') {
                content.innerHTML = `<div class="note-card"><h3>${currentSubject} Logic Notes</h3><p>Mastering first principles to ensure a 5% pass rate success.</p></div>`;
            } else {
                content.innerHTML = `<h2>Exam Simulation</h2><p>Question: How does logic impact national development?</p><button class="nav-pill" style="width:100%; margin-top:20px; text-align:left;">A) Systemic Analysis</button>`;
            }
        }

        function closeOverlay() { document.getElementById('room-overlay').style.display = 'none'; }
        function exitWork() { document.getElementById('workspace').style.display = 'none'; }
    </script>
</body>
</html>

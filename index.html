<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DODOLA_LAB_V3.0 | Source of Genius</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&family=Major+Mono+Display&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #23d5ab;
            --neon-glow: rgba(35, 213, 171, 0.4);
            --bg-deep: #01040a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; outline: none; }
        body { background: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- 1. PREMIUM NAVIGATION --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
            background: rgba(1, 4, 10, 0.85); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; border-bottom: 1px solid var(--border);
        }
        .logo { font-family: 'Major Mono Display'; color: var(--neon); font-size: 1.4rem; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: white; font-family: var(--font-mono); font-size: 0.75rem; transition: 0.3s; opacity: 0.7; cursor: pointer; }
        .nav-links a:hover { opacity: 1; color: var(--neon); }

        /* --- 2. HERO SECTION --- */
        header {
            padding: 160px 5% 80px;
            background: linear-gradient(rgba(1, 4, 10, 0.9), rgba(1, 4, 10, 0.95));
            display: flex; justify-content: space-between; align-items: center; min-height: 60vh;
        }
        .hero-text h1 { font-family: 'Major Mono Display'; font-size: 4rem; line-height: 1.1; margin-bottom: 20px; color: white; }
        .stat-box { text-align: right; border-left: 1px solid var(--border); padding-left: 40px; }
        .stat-value { font-size: 6rem; font-weight: 800; color: white; line-height: 1; }
        .stat-label { font-family: var(--font-mono); font-size: 0.7rem; color: var(--neon); letter-spacing: 4px; text-transform: uppercase; }

        /* --- 3. DYNAMIC SELECTOR --- */
        .selector-bar { padding: 40px 5%; display: flex; gap: 15px; background: rgba(255,255,255,0.01); border-top: 1px solid var(--border); }
        .grade-btn {
            padding: 12px 25px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg-card); color: white; font-family: var(--font-mono);
            cursor: pointer; transition: var(--transition); font-size: 0.8rem;
        }
        .grade-btn.active { background: var(--neon); color: var(--bg-deep); border-color: var(--neon); font-weight: bold; box-shadow: 0 0 15px var(--neon-glow); }

        /* --- 4. ACADEMIC GRID --- */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 40px 5%; }
        .stream-container { background: rgba(255,255,255,0.01); border: 1px solid var(--border); border-radius: 40px; padding: 40px; }
        .stream-tag { font-family: 'Major Mono Display'; color: var(--neon); margin-bottom: 30px; border-bottom: 1px solid var(--neon); display: inline-block; padding-bottom: 8px; font-size: 1rem; }
        .subject-card {
            background: var(--bg-card); border: 1px solid var(--border); padding: 25px; border-radius: 15px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; transition: var(--transition); cursor: pointer;
        }
        .subject-card:hover { transform: scale(1.02); border-color: var(--neon); background: rgba(35, 213, 171, 0.05); }

        /* --- 5. THE RESEARCH LAB (FROM YOUR SCREENSHOT) --- */
        .academic-room { display: none; position: fixed; inset: 0; background: #01040a; z-index: 6000; padding: 80px 5% 40px; }
        .lab-layout { display: grid; grid-template-columns: 280px 1fr; gap: 40px; height: 80vh; }
        .sidebar { overflow-y: auto; border-right: 1px solid var(--border); padding-right: 20px; }
        .sidebar-item { padding: 15px; border-radius: 12px; font-family: var(--font-mono); font-size: 0.75rem; color: #666; cursor: pointer; margin-bottom: 8px; transition: 0.3s; border: 1px solid transparent; }
        .sidebar-item.active { border-color: var(--neon); color: var(--neon); background: rgba(35, 213, 171, 0.05); }
        .content-area { overflow-y: auto; padding: 40px; background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border); border-radius: 30px; position: relative; }
        .note-card { background: var(--bg-card); border-left: 4px solid var(--neon); padding: 30px; margin-bottom: 25px; border-radius: 0 15px 15px 0; }
        .formula-box { background: #000; padding: 20px; border-radius: 10px; font-family: var(--font-mono); font-size: 0.9rem; color: #888; margin-top: 15px; border-left: 3px solid var(--neon); }

        /* --- 6. THE QUIZ ARENA --- */
        #quiz-overlay { display: none; position: fixed; inset: 0; background: radial-gradient(circle, #01040a, #000); z-index: 8000; padding: 100px 5%; backdrop-filter: blur(50px); }
        .quiz-card { max-width: 800px; margin: 0 auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: 40px; padding: 50px; border-top: 3px solid var(--neon); }
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .option-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; color: white; text-align: left; font-family: var(--font-mono); }
        .option-btn:hover { border-color: var(--neon); background: rgba(35, 213, 171, 0.1); transform: translateX(10px); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">DODOLA_LAB</div>
        <div class="nav-links">
            <a onclick="window.scrollTo(0,0)">DASHBOARD</a>
            <a href="#academics">ACADEMICS</a>
            <a href="#rankings">RANKINGS</a>
        </div>
    </nav>

    <header>
        <div class="hero-text">
            <p class="stat-label">[ SOURCE OF GENUS ]</p>
            <h1 id="portal-title">G12_PORTAL</h1>
            <p style="max-width: 500px; line-height: 1.6; opacity: 0.6; font-size: 0.9rem;">The premier academic portal for the Brightest Generation. Excellence through logic.</p>
        </div>
        <div class="stat-box">
            <p class="stat-label">NAT_EXAM_AVG</p>
            <div class="stat-value">590<span style="font-size: 2rem; opacity: 0.2;">/600</span></div>
        </div>
    </header>

    <div class="selector-bar">
        <button class="grade-btn active" onclick="changeGrade(12, this)">GRADE_12</button>
        <button class="grade-btn" onclick="changeGrade(11, this)">GRADE_11</button>
        <button class="grade-btn" onclick="changeGrade(10, this)">GRADE_10</button>
        <button class="grade-btn" onclick="changeGrade(9, this)">GRADE_09</button>
    </div>

    <section id="academics" class="main-grid">
        <div class="stream-container">
            <div class="stream-tag">NATURAL_SCIENCE</div>
            <div id="nat-list"></div>
        </div>
        <div class="stream-container">
            <div class="stream-tag">SOCIAL_SCIENCE</div>
            <div id="soc-list"></div>
        </div>
    </section>

    <div id="research-lab" class="academic-room">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2 id="lab-subject-title" style="font-family: 'Major Mono Display'; color: var(--neon);">SUBJECT_LAB</h2>
            <div style="display: flex; gap: 10px;">
                <button class="grade-btn active" onclick="openQuiz()">START_QUIZ</button>
                <button class="grade-btn" onclick="closeLab()">CLOSE_LAB</button>
            </div>
        </div>
        <div class="lab-layout">
            <div id="sidebar-chapters" class="sidebar"></div>
            <div id="main-notes" class="content-area"></div>
        </div>
    </div>

    <div id="quiz-overlay">
        <div class="quiz-card">
            <p id="quiz-tag" class="stat-label">ASSESSMENT_ACTIVE</p>
            <h2 id="question-display" style="margin: 30px 0;">Logic sequence initiated...</h2>
            <div id="quiz-options" class="option-grid"></div>
            <button class="grade-btn" style="margin-top: 40px; width: 100%;" onclick="closeQuiz()">TERMINATE_SESSION</button>
        </div>
    </div>

    <script>
        const contentDB = {
            "G12_Maths": [
                { title: "01_CALCULUS_II", notes: "<div class='note-card'><h3>INTEGRATION_BY_PARTS</h3><p>Advanced integration logic.</p><div class='formula-box'>∫ u dv = uv - ∫ v du</div></div>", quiz: [{q: "Formula for Parts?", o: ["uv + ∫vdu", "uv - ∫vdu"], a: 1}] },
                { title: "02_LINEAR_ALGEBRA", notes: "<div class='note-card'><h3>MATRICES</h3><p>System of linear equations.</p></div>", quiz: [{q: "Is A*B always B*A?", o: ["Yes", "No"], a: 1}] }
            ],
            "G12_Physics": [
                { title: "01_MODERN_PHYSICS", notes: "<div class='note-card'><h3>PHOTOELECTRIC_EFFECT</h3><p>hf = Φ + KE_max</p></div>", quiz: [{q: "Who explained this?", o: ["Einstein", "Newton"], a: 0}] }
            ]
        };

        let currentGrade = 12;
        let activeSubjectKey = "";
        let activeChapterIndex = 0;

        function changeGrade(grade, btn) {
            document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentGrade = grade;
            document.getElementById('portal-title').innerText = `G${grade}_PORTAL`;
            renderSubjectCards();
        }

        function renderSubjectCards() {
            const subjects = ["Maths", "Physics", "Chemistry", "Biology"];
            document.getElementById('nat-list').innerHTML = subjects.map(s => `
                <div class="subject-card" onclick="openLab('G${currentGrade}_${s}')">
                    <div><h3>${s}</h3><p class="stat-label" style="font-size:0.6rem;">Logic_Synced</p></div>
                    <div style="color:var(--neon); font-family:var(--font-mono); font-size:0.7rem;">[ OPEN ]</div>
                </div>`).join('');
            
            document.getElementById('soc-list').innerHTML = `<p style="opacity:0.4; font-family:var(--font-mono);">SOCIAL_MODULES_OFFLINE</p>`;
        }

        function openLab(key) {
            if (!contentDB[key]) return alert("Database empty for this subject. Insert notes into contentDB.");
            activeSubjectKey = key;
            document.getElementById('lab-subject-title').innerText = key.replace('_', ' ');
            document.getElementById('research-lab').style.display = 'block';
            document.body.style.overflow = 'hidden';
            renderChapters();
        }

        function renderChapters() {
            const chapters = contentDB[activeSubjectKey];
            document.getElementById('sidebar-chapters').innerHTML = chapters.map((ch, i) => `
                <div class="sidebar-item ${i === 0 ? 'active' : ''}" onclick="selectChapter(${i}, this)">${ch.title}</div>`).join('');
            selectChapter(0, document.querySelector('.sidebar-item'));
        }

        function selectChapter(index, btn) {
            activeChapterIndex = index;
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('main-notes').innerHTML = contentDB[activeSubjectKey][index].notes;
        }

        function openQuiz() {
            const ch = contentDB[activeSubjectKey][activeChapterIndex];
            document.getElementById('quiz-overlay').style.display = 'block';
            const q = ch.quiz[0];
            document.getElementById('question-display').innerText = q.q;
            document.getElementById('quiz-options').innerHTML = q.o.map((opt, i) => `
                <button class="option-btn" onclick="checkAnswer(${i}, ${q.a}, this)">${opt}</button>`).join('');
        }

        function checkAnswer(sel, cor, btn) {
            if(sel === cor) { btn.style.background = "rgba(35, 213, 171, 0.2)"; alert("Correct!"); }
            else { btn.style.background = "rgba(255, 0, 0, 0.1)"; alert("Incorrect."); }
        }

        function closeLab() { document.getElementById('research-lab').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function closeQuiz() { document.getElementById('quiz-overlay').style.display = 'none'; }

        window.onload = renderSubjectCards;
    </script>
</body>
</html>

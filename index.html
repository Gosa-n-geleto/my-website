<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>LAUREATE_OS v4.0 | STABLE_RELEASE</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* REFACTORED SYSTEM VARIABLES */
        :root {
            --neon: #23d5ab;
            --bg-dark: #050508;
            --panel: #0a0a10;
            --border: rgba(255, 255, 255, 0.08);
            --trans: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* HIGH-PERFORMANCE GLASS UI */
        .sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            padding: 30px;
            z-index: 100;
        }

        .main-content { margin-left: 280px; padding: 40px; }

        .stat-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            transition: var(--trans);
        }

        .stat-card:hover { border-color: var(--neon); background: rgba(35, 213, 171, 0.05); }

        /* EXAM ENGINE STYLES */
        .exam-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 2000;
            padding: 40px;
            overflow-y: auto;
        }

        .option-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--trans);
        }

        .option-btn.selected { border-color: var(--neon); background: rgba(35, 213, 171, 0.15); }

        /* MOBILE ADAPTATION */
        @media (max-width: 900px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <aside class="sidebar">
            <h2 style="font-family: 'JetBrains Mono'; color: var(--neon); margin-bottom: 40px;">LAUREATE_OS</h2>
            <div class="stat-card">
                <p style="font-size: 0.7rem; color: #555;">USER_PROFILE</p>
                <h3 style="margin: 5px 0;">GOSA NEGESO</h3>
                <div style="font-size: 0.8rem; color: var(--neon);">National Rank: #1</div>
            </div>
            
            <nav style="margin-top: 40px;">
                <button onclick="toggleExam(true)" style="width: 100%; padding: 15px; background: var(--neon); color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer;">START_NEW_EXAM</button>
            </nav>
        </aside>

        <main class="main-content">
            <h1 style="font-size: 2.5rem; margin-bottom: 30px;">System_Dashboard</h1>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                <div class="stat-card"><h3>94%</h3><p>Avg Accuracy</p></div>
                <div class="stat-card"><h3>12</h3><p>Day Streak</p></div>
                <div class="stat-card"><h3>500+</h3><p>Q_Bank Size</p></div>
            </div>
        </main>
    </div>

    <div id="exam-room" class="exam-overlay">
        <div style="max-width: 900px; margin: 0 auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <div id="timer" style="font-family: 'JetBrains Mono'; font-size: 2.5rem; color: var(--neon);">90:00</div>
                <button onclick="toggleExam(false)" style="background: #222; color: #fff; border: none; padding: 10px 20px; border-radius: 5px;">EXIT</button>
            </div>

            <div class="stat-card" style="min-height: 400px; padding: 40px;">
                <h2 id="q-text" style="font-size: 1.8rem; margin-bottom: 40px;"></h2>
                <div id="options-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;"></div>
            </div>

            <div style="margin-top: 30px; display: flex; gap: 20px;">
                <button onclick="moveQ(-1)" id="prevBtn" class="option-btn">BACK</button>
                <button onclick="moveQ(1)" id="nextBtn" class="option-btn" style="background: var(--neon); color: #000;">NEXT</button>
            </div>
        </div>
    </div>

    <script>
        // DATA MODEL
        const questions = [
            {q: "What is the derivative of 3x² + 5x?", o: ["6x + 5", "3x + 5", "6x", "5"], a: 0},
            {q: "In Physics, what is the SI unit of Force?", o: ["Joule", "Watt", "Newton", "Pascal"], a: 2},
            {q: "Solve for x: 2x + 10 = 20", o: ["5", "10", "15", "20"], a: 0}
        ];

        let state = {
            currentIdx: 0,
            answers: new Array(questions.length).fill(null),
            timer: 5400
        };

        function toggleExam(show) {
            document.getElementById('exam-room').style.display = show ? 'block' : 'none';
            if(show) { loadQ(); startTimer(); }
        }

        function loadQ() {
            const q = questions[state.currentIdx];
            document.getElementById('q-text').innerText = `${state.currentIdx + 1}. ${q.q}`;
            const grid = document.getElementById('options-grid');
            grid.innerHTML = q.o.map((opt, i) => `
                <div class="option-btn ${state.answers[state.currentIdx] === i ? 'selected' : ''}" onclick="selectAnswer(${i})">
                    <strong>${String.fromCharCode(65+i)}</strong> ${opt}
                </div>
            `).join('');
            
            document.getElementById('prevBtn').disabled = state.currentIdx === 0;
            document.getElementById('nextBtn').innerText = state.currentIdx === questions.length - 1 ? 'FINISH' : 'NEXT';
        }

        function selectAnswer(i) {
            state.answers[state.currentIdx] = i;
            loadQ();
        }

        function moveQ(dir) {
            if(state.currentIdx === questions.length -1 && dir === 1) { submitExam(); return; }
            state.currentIdx += dir;
            loadQ();
        }

        function startTimer() {
            const timerEl = document.getElementById('timer');
            const itv = setInterval(() => {
                state.timer--;
                let m = Math.floor(state.timer / 60);
                let s = state.timer % 60;
                timerEl.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if(state.timer <= 0) { clearInterval(itv); submitExam(); }
            }, 1000);
        }

        function submitExam() {
            const score = state.answers.filter((a, i) => a === questions[i].a).length;
            alert(`EXAM COMPLETE. Score: ${score}/${questions.length}`);
            location.reload();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gosa Negeso | Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            /* This creates a moving background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            color: white;
            transition: 0.5s;
        }

        .glass-card:hover {
            transform: scale(1.02);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 45px rgba(255,255,255,0.1);
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
            object-fit: cover;
            transition: 0.5s;
        }

        .glass-card:hover .profile-pic {
            border-color: #fff;
            transform: rotate(5deg);
        }

        h1 { font-size: 2.2rem; margin-bottom: 5px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 30px; letter-spacing: 1px; }

        .btn {
            background: #fff;
            color: #333;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background: #23a6d5;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="Screenshot 2026-04-11 210033.png" alt="Gosa" class="profile-pic">
        
        <h1>Gosa Negeso</h1>
        <p>Software Innovator</p>
        
        <a href="#" class="btn" onclick="alert('Sending message...')">Let's Connect</a>
    </div>

</body>
</html>

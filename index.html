<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodola Lab | Educational OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); }
        body { background: #010410; color: #e2e8f0; overflow-x: hidden; min-height: 100vh; }

        /* --- STAGE 1: MISSION & VISION --- */
        #mission-gate {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(1,4,16,0.85), rgba(1,4,16,0.85)), url('dodola-school.jpg');
            background-size: cover; background-position: center;
        }
        .mission-box {
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px);
            border-radius: 40px; padding: 50px; max-width: 650px; text-align: center;
            border: 1px solid rgba(35, 213, 171, 0.2); box-shadow: 0 0 50px rgba(35, 213, 171, 0.1);
        }

        /* --- STAGE 2: HUB VIEW --- */
        #app-view { display: none; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .major-mono { font-family: 'Major Mono Display', monospace; color: #23d5ab; }
        .selector-row { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px; border-radius: 12px; cursor: pointer; font-size: 0.9rem;
        }
        .tab-btn.active { background: #23d5ab; color: #010410; font-weight: 700; border-color: transparent; box-shadow: 0 0 15px #23d5ab; }

        /* Subject Grid */
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .subject-card {
            background: rgba(255,255,255,0.03); padding: 35px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer; text-align: center;
        }
        .subject-card:hover { border-color: #23d5ab; background: rgba(35, 213, 171, 0.05); transform: translateY(-5px); }

        /* --- STAGE 3: MODAL --- */
        #content-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #010410; z-index: 1000; padding: 40px; overflow-y: auto;
        }
        .btn {
            background: #23d5ab; color: #010410; padding: 15px 35px; border-radius: 12px;
            font-weight: bold; cursor: pointer; border: none; margin-top: 15px; display: inline-block;
        }
        .option-btn {
            width: 100%; text-align: left; background: rgba(255,255,255,0.05); color: white;
            padding: 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 10px; cursor: pointer;
        }
        .option-btn:hover { background: rgba(35, 213, 171, 0.1); border-color: #23d5ab; }
    </style>
</head>
<body>

    <section id="mission-gate">
        <div class="mission-box">
            <h1 class="major-mono" style="font-size: 2.8rem; margin-bottom: 20px;">DODOLA LAB</h1>
            <div style="text-align: left; margin-bottom: 30px;">
                <h3 style="color: #23d5ab; margin-bottom: 5px;">Our Mission</h3>
                <p style="opacity: 0.8; margin-bottom: 20px;">Empowering Grades 9-12 with the same mathematical logic that achieved a 590/600 national record.</p>
                <h3 style="color: #23d5ab; margin-bottom: 5px;">Our Vision</h3>
                <p style="opacity: 0.8;">

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodola Hub v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&family=Major+Mono+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #23d5ab;
            --bg: #01040a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: var(--font-main); overflow-x: hidden; }

        /* --- STAGE 1: CINEMATIC GATEWAY --- */
        #gateway {
            height: 100vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('your-school-image.jpg') center/cover;
            display: flex; align-items: center; justify-content: center;
            transition: 1s ease-in-out;
        }

        .enter-btn {
            padding: 20px 60px; background: var(--neon); color: var(--bg);
            border-radius: 50px; font-family: 'Major Mono Display'; font-weight: bold;
            cursor: pointer; border: none; font-size: 1.2rem; box-shadow: 0 0 20px var(--neon);
        }

        /* --- STAGE 2: THE DUAL HUB --- */
        #main-ui { display: none; padding: 40px 5%; opacity: 0; transition: 1.5s; }

        .hero-banner {
            background: var(--glass); border: 1px solid var(--border);
            padding: 40px; border-radius: 24px; display: flex; 
            justify-content: space-between; align-items: center; margin-bottom: 40px;
        }

        .stream-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        
        .column-title { 
            font-family: 'Major Mono Display'; color: var(--neon); 
            letter-spacing: 3px; margin-bottom: 25px; border-bottom: 1px solid var(--neon);
            display: inline-block; padding-bottom: 5px;
        }

        .subject-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 25px; border-radius: 16px; margin-bottom: 15px;
            cursor: pointer; transition: 0.3s;
        }

        .subject-card:hover { border-color: var(--neon); background: rgba(35, 213, 171, 0.05); }

        .record-text { font-size: 5rem; font-weight: 700; font-family: var(--font-main); }
    </style>
</head>
<body>

    <div id="gateway">
        <button class="enter-btn" onclick="unlockHub()">ENTER_LAB</button>
    </div>

    <div id="main-ui">
        <div class="hero-banner">
            <div>
                <h1 style="font-size: 3rem; font-family: 'Major Mono Display';">G12_LOGIC</h1>
                <p style="opacity:0.6;">Advanced mathematical logic & university prep.</p>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 0.8rem; opacity: 0.4;">NATIONAL_RECORD</p>
                <div class="record-text">590/600</div>
            </div>
        </div>

        <div class="stream-grid">
            <div class="stream-col">
                <h3 class="column-title">NATURAL_SCIENCE</h3>
                <div class="subject-card"><h3>MATHS</h3><p>G12 Logic Hub</p></div>
                <div class="subject-card"><h3>PHYSICS</h3><p>G12 Logic Hub</p></div>
            </div>
            <div class="stream-col">
                <h3 class="column-title">SOCIAL_SCIENCE</h3>
                <div class="subject-card"><h3>HISTORY</h3><p>G12 Logic Hub</p></div>
                <div class="subject-card"><h3>GEOGRAPHY</h3><p>G12 Logic Hub</p></div>
            </div>
        </div>
    </div>

    <script>
        function unlockHub() {
            document.getElementById('gateway').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gateway').style.display = 'none';
                const ui = document.getElementById('main-ui');
                ui.style.display = 'block';
                setTimeout(() => ui.style.opacity = '1', 100);
            }, 1000);
        }
    </script>
</body>
</html>

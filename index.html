<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dodola Lab | ProMax</title>
    <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #23d5ab; --bg: #010410; --card: rgba(255,255,255,0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.5s cubic-bezier(0.1, 0.8, 0.2, 1); }
        body { background: var(--bg); color: #e2e8f0; overflow-x: hidden; font-family: 'Space Grotesk', sans-serif; }

        /* --- STAGE 1: THE ENTRANCE --- */
        #entrance-gate {
            height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(1,4,16,0.9), rgba(1,4,16,0.9)), url('dodola-school.jpg') center/cover;
        }
        .pro-btn { 
            background: transparent; border: 2px solid var(--neon); color: var(--neon); 
            padding: 20px 50px; font-family: 'Major Mono Display'; font-size: 1.2rem; 
            cursor: pointer; letter-spacing: 5px; border-radius: 50px;
        }
        .pro-btn:hover { background: var(--neon); color: var(--bg); box-shadow: 0 0 30px var(--neon); }

        /* --- STAGE 2: THE MANIFESTO (Motto/Mission/Vision) --- */
        #manifesto-overlay {
            display: none; position: fixed; inset: 0; z-index: 2000; background: var(--bg);
            padding: 60px; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .manifesto-text { font-family: 'Major Mono Display'; color: var(--neon); margin-bottom: 20px; opacity: 0; transform: translateY(20px); }

        /* --- STAGE 3: THE COMMAND HUB --- */
        #hub-view { display: none; padding: 60px 5%; opacity: 0; }
        .grade-center { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; }
        .grade-pill { 
            padding: 15px 30px; border-radius: 100px; background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; font-weight: 700; color: rgba(255,255,255,0.5);
        }
        .grade-pill.active { background: var(--neon); color: var(--bg); border-color: transparent; box-shadow: 0 0 20px rgba(35, 213, 171, 0.4); }

        /* The Dossier (Grade Details) */
        #grade-dossier { 
            background: var(--card); border-radius: 30px; padding: 40px; margin-bottom: 50px;
            border: 1px solid rgba(255,255,255,0.05); display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
        }

        /* The Wings */
        .wing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .wing-box { background: rgba(255,255,255,0.02); border-radius: 25px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .subject-tag { 
            padding: 20px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 10px;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .subject-tag:hover { border-left: 5px solid var(--neon); background: rgba(35, 213, 171, 0.05); }

        /* --- STAGE 4: THE LAB (QUIZ) --- */
        #lab-modal {
            display: none; position: fixed; inset: 0; z-index: 3000; background: #010410; padding: 40px;
            font-family: 'JetBrains Mono', monospace;
        }
        .lab-header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 40px; }
        .focus-clock { color: var(--neon); font-size: 2rem; font-weight: 700; text-shadow: 0 0 10px var(--neon); }
        
        .option-pro {
            display: block; width: 100%; padding: 20px; margin-bottom: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; cursor: pointer; text-align: left;
        }
        .option-pro:hover { border-color: var(--neon); box-shadow: inset 0 0 15px rgba(35, 213, 171, 0.1); }
    </style>
</head>
<body>

    <section id="entrance-gate">
        <button class="pro-btn" onclick="triggerManifesto()">ENTER_LAB</button>
    </section>

    <div id="manifesto-overlay">
        <h2 class="manifesto-text" id="m1">WE ARE RESPONSIBLE CITIZENS</h2>
        <h2 class="manifesto-text" id="m2">MISSION: OROMIA AS THE SOURCE OF GENIUS</h2>
        <h2 class="manifesto-text" id="m3">VISION: IMPACT. INNOVATE. LEAD.</h2>
    </div>

    <section id="hub-view">
        <div class="grade-center" id="grade-pills">
            <div class="grade-pill active" onclick="selectGrade(12, this)">G12</div>
            <div class="grade-pill" onclick="selectGrade(11, this)">G11</div>
            <div class="grade-pill" onclick="selectGrade(10, this)">G10</div>
            <div class="grade-pill" onclick="selectGrade(9, this)">G9</div>
        </div>

        <div id="grade-dossier">
            <div>
                <h1 id="dossier-title" class="major-mono" style="color:var(--neon); font-size: 3rem;">G12</h1>
                <p id="dossier-desc" style="opacity:0.6; margin-top:10px;">University Readiness & Advanced Logic Integration.</p>
            </div>
            <div style="text-align: right;">
                <p style="opacity:0.4">EXCELLENCE_RECORD</p>
                <h1 style="font-size: 4rem;">590/600</h1>
            </div>
        </div>

        <div class="wing-grid">
            <div class="wing-box">
                <h3 class="major-mono" style="margin-bottom:20px; color:var(--neon)">NATURAL_STREAM</h3>
                <div id="nat-list"></div>
            </div>
            <div class="wing-box">
                <h3 class="major-mono" style="margin-bottom:20px; color:var(--neon)">SOCIAL_STREAM</h3>
                <div id="soc-list"></div>
            </div>
        </div>
    </section>

    <div id="lab-modal">
        <div class="lab-header">
            <div>
                <h4 class="major-mono" id="lab-subject">SUBJECT</h4>
                <p style="opacity:0.5; font-size:0.8rem;">DODOLA_LAB_SYSTEM_ACTIVE</p>
            </div>
            <div id="clock" class="focus-clock">00:00:00</div>
        </div>

        <div style="max-width: 800px; margin: 0 auto;">
            <h2 id="q-text" style="margin-bottom: 40px; font-size: 1.8rem;">Question Content?</h2>
            <div id="opt-container"></div>
            
            <div id="feedback" style="display:none; margin-top:40px; padding:30px; border-radius:20px; background: rgba(255,255,255,0.02); border: 1px solid var(--neon);">
                <h3 id="res-status" style="margin-bottom:10px;"></h3>
                <p id="res-explain" style="opacity:0.8; line-height:1.6;"></p>
                <button class="pro-btn" style="margin-top:20px; font-size:0.8rem;" onclick="nextQ()">CONTINUE_SEQUENCE</button>
            </div>
        </div>
        <button class="pro-btn" style="position:fixed; bottom:40px; right:40px; font-size:0.7rem; letter-spacing:2px;" onclick="exitLab()">EXIT_LAB</button>
    </div>

    <script>
        const gradeInfo = {
            12: "University Readiness & Advanced Logic Integration. Focus on National Exam Excellence.",
            11: "Core Foundation of Specialized Streams. Preparing for the Senior Transition.",
            10: "Secondary Synthesis. Mapping the path between Science and Social studies.",
            9: "Exploration & Fundamental Discovery. Establishing the Academic Identity."
        };

        const subjects = {
            nat: ['Maths', 'Physics', 'Chemistry', 'Biology'],
            soc: ['Geography', 'History', 'Economics', 'English']
        };

        const quizDB = {
            'Biology': [{ q: "Which organelle creates ATP?", a: "Mitochondria", options: ["Ribosome", "Mitochondria", "Nucleus"], explain: "The powerhouse of the cell." }],
            'History': [{ q: "Founding year of the UN?", a: "1945", options: ["1918", "1945", "1963"], explain: "Established post-WWII for global stability." }]
        };

        let currentSub = '';
        let qIdx = 0;

        function triggerManifesto() {
            document.getElementById('entrance-gate').style.display = 'none';
            const manifest = document.getElementById('manifesto-overlay');
            manifest.style.display = 'flex';
            
            setTimeout(() => { document.getElementById('m1').style.opacity = 1; document.getElementById('m1').style.transform = 'none'; }, 500);
            setTimeout(() => { document.getElementById('m2').style.opacity = 1; document.getElementById('m2').style.transform = 'none'; }, 1500);
            setTimeout(() => { document.getElementById('m3').style.opacity = 1; document.getElementById('m3').style.transform = 'none'; }, 2500);
            setTimeout(() => { 
                manifest.style.opacity = 0;
                setTimeout(() => { 
                    manifest.style.display = 'none';
                    document.getElementById('hub-view').style.display = 'block';
                    setTimeout(() => document.getElementById('hub-view').style.opacity = 1, 100);
                    renderHub();
                }, 1000);
            }, 5000);
        }

        function selectGrade(g, el) {
            document.querySelectorAll('.grade-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('dossier-title').innerText = `G${g}`;
            document.getElementById('dossier-desc').innerText = gradeInfo[g];
        }

        function renderHub() {
            const wrap = (list, id) => {
                document.getElementById(id).innerHTML = list.map(s => `
                    <div class="subject-tag" onclick="startLab('${s}')">
                        <span>${s}</span>
                        <span style="color:var(--neon); font-size:0.8rem;">→ START</span>
                    </div>
                `).join('');
            };
            wrap(subjects.nat, 'nat-list');
            wrap(subjects.soc, 'soc-list');
        }

        function startLab(sub) {
            currentSub = sub; qIdx = 0;
            document.getElementById('lab-modal').style.display = 'block';
            document.getElementById('lab-subject').innerText = sub;
            loadQ();
            startClock();
        }

        function loadQ() {
            const data = quizDB[currentSub] || quizDB['Biology'];
            const q = data[qIdx % data.length];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('feedback').style.display = 'none';
            document.getElementById('opt-container').innerHTML = q.options.map(o => `
                <button class="option-pro" onclick="verify('${o}', '${q.a}', '${q.explain}')">${o}</button>
            `).join('');
        }

        function verify(s, a, e) {
            const f = document.getElementById('feedback');
            f.style.display = 'block';
            document.getElementById('res-status').innerText = s === a ? "LOGIC_VERIFIED" : "ANALYSIS_REQUIRED";
            document.getElementById('res-status').style.color = s === a ? var(--neon) : "#ff4d4d";
            document.getElementById('res-explain').innerText = e;
        }

        function startClock() {
            setInterval(() => {
                const now = new Date(new Date().getTime() + (3 * 60 * 60 * 1000));
                document.getElementById('clock').innerText = now.toISOString().substr(11, 8);
            }, 1000);
        }

        function exitLab() { document.getElementById('lab-modal').style.display = 'none'; }
        function nextQ() { qIdx++; loadQ(); }
    </script>
</body>
</html>
